<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><link rel="stylesheet" href="../css/styles.css"><script src="../js/config.js"></script><script src="../js/common.js"></script></head><body>
<div class="page">
  <h1 class="h1">Reports</h1>
  <div class="card">
    <div class="grid cols-3">
      <div><label>Report</label>
        <select id="rep" class="input">
          <option value="daily">Daily Collection</option>
          <option value="monthly">Monthly Collection</option>
          <option value="yearly">Yearly Collection</option>
          <option value="student">Student-wise Collection</option>
          <option value="class">Class-wise Collection</option>
          <option value="board">Board-wise Collection</option>
          <option value="out">Outstanding Report</option>
          <option value="inactive">Inactive Students</option>
          <option value="left">Left Students</option>
        </select>
      </div>
      <div><label>From</label><input id="from" type="date" class="input"></div>
      <div><label>To</label><input id="to" type="date" class="input"></div>
    </div>
    <div class="right" style="margin-top:1rem">
      <button class="btn primary" id="run">Run</button>
      <button class="btn" id="xls">Excel</button>
      <button class="btn" id="pdf">PDF</button>
      <button class="btn" onclick="window.print()">Print</button>
    </div>
  </div>
  <div style="height:1rem"></div>
  <div class="card" style="overflow:auto">
    <h3 id="ttl">—</h3>
    <table class="table" id="tbl"><thead></thead><tbody></tbody></table>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf-autotable@3.8.2/dist/jspdf.plugin.autotable.min.js"></script>
<script type="module">
import { sb } from "../js/supabase.js";
import { ledger } from "../js/fees-lib.js";

let head=[], body=[], title="";

function show(h,b,t){
  head=h; body=b; title=t;
  document.getElementById("ttl").textContent = t;
  document.querySelector("#tbl thead").innerHTML = `<tr>${h.map(x=>`<th>${x}</th>`).join("")}</tr>`;
  document.querySelector("#tbl tbody").innerHTML = b.map(r=>`<tr>${r.map(c=>`<td>${c}</td>`).join("")}</tr>`).join("") || `<tr><td colspan="${h.length}" class=muted style="text-align:center;padding:1rem">No data</td></tr>`;
}

async function fetchCollections(){
  let q = sb.from("fee_collections").select("*");
  const f = document.getElementById("from").value, t = document.getElementById("to").value;
  if(f) q = q.gte("collection_date",f); if(t) q = q.lte("collection_date",t);
  const { data } = await q; return data||[];
}

document.getElementById("run").onclick = async ()=>{
  const r = document.getElementById("rep").value;
  const { data: students } = await sb.from("students").select("*");
  const sMap = Object.fromEntries(students.map(s=>[s.student_id,s]));
  if(["daily","monthly","yearly","student","class","board"].includes(r)){
    const pays = await fetchCollections();
    const acc = {};
    pays.forEach(p=>{
      const s = sMap[p.student_id]||{};
      let k="";
      if(r==="daily") k = p.collection_date;
      else if(r==="monthly") k = p.fee_year+"-"+String(p.fee_month).padStart(2,"0");
      else if(r==="yearly") k = String(p.fee_year);
      else if(r==="student") k = (s.name||"—")+" ("+s.student_code+")";
      else if(r==="class") k = s.class||"—";
      else if(r==="board") k = s.board||"—";
      acc[k] = acc[k] || {paid:0, disc:0, n:0};
      acc[k].paid += Number(p.amount_paid); acc[k].disc += Number(p.discount); acc[k].n++;
    });
    const rows = Object.entries(acc).sort().map(([k,v])=>[k, v.n, fmtINR(v.paid), fmtINR(v.disc)]);
    show(["Group","Records","Total Paid","Total Discount"], rows, "Collection — "+r);
  } else if (r==="out"){
    const rows = [];
    for (const s of students){
      const L = await ledger(s);
      const due = L.reduce((a,x)=>a+x.due,0);
      if(due>0) rows.push([s.student_code, s.name, s.class, s.board, s.status, fmtINR(due)]);
    }
    show(["Code","Name","Class","Board","Status","Outstanding"], rows, "Outstanding Report");
  } else if (r==="inactive" || r==="left"){
    const want = r==="inactive" ? "Inactive" : "Left";
    const rows = students.filter(s=>s.status===want).map(s=>[s.student_code,s.name,s.class,s.board,s.mobile||"",s.admission_date,s.remarks||""]);
    show(["Code","Name","Class","Board","Mobile","Admitted","Remarks"], rows, want+" Students");
  }
};

document.getElementById("xls").onclick = ()=>{
  const ws = XLSX.utils.aoa_to_sheet([head, ...body]);
  const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb,ws,"Report");
  XLSX.writeFile(wb, "report.xlsx");
};
document.getElementById("pdf").onclick = ()=>{
  const { jsPDF } = window.jspdf; const doc = new jsPDF();
  doc.text("Suhrid Tutorial — "+title, 14, 14);
  doc.autoTable({startY:20, head:[head], body});
  doc.save("report.pdf");
};
</script>
</body></html>
